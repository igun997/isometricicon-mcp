name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o dist/isometricicon-mcp-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o dist/isometricicon-mcp-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/isometricicon-mcp-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/isometricicon-mcp-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -o dist/isometricicon-mcp-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
